name: Perch
options:
  bundleIdPrefix: com.steinerco
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"

packages:
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    exactVersion: "9.0.6"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: "2.4.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: "2.9.3"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    exactVersion: "6.29.3"

settings:
  base:
    SWIFT_VERSION: "5.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.arunavak.perch
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Stable self-signed identity so macOS Accessibility/Input-Monitoring grants
    # survive rebuilds (ad-hoc signing changes the code hash every build).
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Perch Dev"
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    DEAD_CODE_STRIPPING: YES
  configs:
    # Off for local dev: hardened runtime's library validation rejects the
    # Debug dylib when signed by a self-signed cert (no Team ID).
    Debug:
      ENABLE_HARDENED_RUNTIME: NO
    # Off for unsigned distribution (hardened runtime requires Developer ID).
    Release:
      ENABLE_HARDENED_RUNTIME: NO

targets:
  Perch:
    type: application
    platform: macOS
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "© 2026 Steiner & Co"
        # Required to query Apple Music / Spotify for now-playing via AppleScript.
        NSAppleEventsUsageDescription: "Perch reads now-playing info from Apple Music and Spotify to show it in the notch."
        # Required to show today's events and the next-meeting countdown (opt-in).
        NSCalendarsUsageDescription: "Perch shows your upcoming events and counts down to your next meeting in the notch."
        NSCalendarsFullAccessUsageDescription: "Perch shows your upcoming events and counts down to your next meeting in the notch."
        # Required to show incomplete reminders in the notch (opt-in).
        NSRemindersUsageDescription: "Perch shows your incomplete reminders grouped by urgency in the notch."
        NSRemindersFullAccessUsageDescription: "Perch shows your incomplete reminders grouped by urgency in the notch."
        # Required to show current weather conditions (optional location lookup).
        NSLocationWhenInUseUsageDescription: "Perch uses your location to show the current weather in the notch."
        # Required for the webcam mirror (camera preview in the notch).
        NSCameraUsageDescription: "Perch shows a live mirror from your camera in the notch so you can check yourself before a call."
        # Sparkle auto-update is dormant until these are configured.
        # See RELEASING.md if you set up a Developer ID + Sparkle feed.
        SUFeedURL: "https://example.com/perch/appcast.xml"
        SUEnableAutomaticChecks: false
        SUPublicEDKey: ""
    sources:
      - path: Sources
    dependencies:
      - package: Defaults
      - package: KeyboardShortcuts
      - package: Sparkle
      - package: GRDB
