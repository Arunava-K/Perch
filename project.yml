name: Mybar
options:
  bundleIdPrefix: com.steinerco
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "14.0"

packages:
  Defaults:
    url: https://github.com/sindresorhus/Defaults
    from: "9.0.0"
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.2.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

settings:
  base:
    SWIFT_VERSION: "5.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.steinerco.mybar
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    # Stable self-signed identity so macOS Accessibility/Input-Monitoring grants
    # survive rebuilds (ad-hoc signing changes the code hash every build).
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "Mybar Dev"
    DEVELOPMENT_TEAM: ""
    PROVISIONING_PROFILE_SPECIFIER: ""
    # Off for local dev: hardened runtime's library validation rejects the
    # Debug dylib when signed by a self-signed cert (no Team ID). Re-enable for
    # a notarized Developer ID release.
    ENABLE_HARDENED_RUNTIME: NO
    DEAD_CODE_STRIPPING: YES

targets:
  Mybar:
    type: application
    platform: macOS
    info:
      path: Sources/Info.plist
      properties:
        LSUIElement: true
        NSPrincipalClass: NSApplication
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSHumanReadableCopyright: "© 2026 Steiner & Co"
        # Required to query Apple Music / Spotify for now-playing via AppleScript.
        NSAppleEventsUsageDescription: "Mybar reads now-playing info from Apple Music and Spotify to show it in the notch."
        # Required to show today's events and the next-meeting countdown (opt-in).
        NSCalendarsUsageDescription: "Mybar shows your upcoming events and counts down to your next meeting in the notch."
        NSCalendarsFullAccessUsageDescription: "Mybar shows your upcoming events and counts down to your next meeting in the notch."
        # Required for the webcam mirror (camera preview in the notch).
        NSCameraUsageDescription: "Mybar shows a live mirror from your camera in the notch so you can check yourself before a call."
        # Sparkle auto-update. Fill in before shipping (see RELEASING.md):
        #   SUFeedURL: your published appcast.xml URL
        #   SUPublicEDKey: the EdDSA public key from Sparkle's generate_keys
        SUFeedURL: "https://example.com/mybar/appcast.xml"
        SUEnableAutomaticChecks: false
        SUPublicEDKey: ""
    sources:
      - path: Sources
    dependencies:
      - package: Defaults
      - package: KeyboardShortcuts
      - package: Sparkle
      - package: GRDB
